{%- assign buildAt = site.time | date: "%Y%m%d%H%M%S" -%}
<head>
  <title>{{ page.title }}-{{ site.title }}</title>
  <meta charset="utf-8" />
  <meta http-equiv="content-language" content="zh-CN" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="supported-color-schemes" content="light dark" />
  <meta name="renderer" content="webkit" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="applicable-device" content="pc,mobile" />
  <meta name="author" content="{{ site.author }}" />
  {%- if page.categories %}
  <meta name="description" content="{{ page.title }}" />
  <meta name="keywords" content="{{ site.author }}{% for category in page.categories %},{{ category }}{% endfor %}" />
  {% else %}
  <meta name="description" content="{{ site.description }}" />
  <meta name="keywords" content="{{ site.keywords }}" />
  {% endif -%}
  <link rel="icon" href="{{site.baseurl}}/static/img/favicon.ico" />
  <link rel="apple-touch-icon" href="{{site.baseurl}}/static/img/logo.png" />
  <link rel="stylesheet" href="{{site.baseurl}}/static/css/common.css?t={{buildAt}}" />
  <link rel="stylesheet" href="{{site.baseurl}}/static/css/theme-dark.css?t={{buildAt}}" />
  {%- if page.layout == "mypost" %}
  <link rel="stylesheet" href="{{site.baseurl}}/static/css/post.css?t={{buildAt}}" />
  <link rel="stylesheet" href="{{site.baseurl}}/static/css/code-dark.css?t={{buildAt}}" />
  <link rel="stylesheet" href="{{site.baseurl}}/static/css/code-light.css?t={{buildAt}}" />
  {%- endif %} {%- if page.layout == "page" %}
  <link rel="stylesheet" href="{{site.baseurl}}/static/css/page.css?t={{buildAt}}" />
  {%- endif %}
  <script>
    window.blog = {
      baseurl: '{{site.baseurl}}',
      buildAt: '{{buildAt}}',
      darkMode: false,
      appearance: {
        defaults: {
          themeMode: 'system',
          fontSize: 17,
          lineHeight: 1.72,
          accent: 'ink',
          surface: 'pure',
          rainbow: 'off',
          rainbowSpeed: 5
        },
        themeColors: {
          pure: { light: '#ffffff', dark: '#0d1117' },
          paper: { light: '#fdf8ee', dark: '#11151b' },
          mist: { light: '#f4f8fc', dark: '#101722' }
        },
        normalize: function (settings) {
          var defaults = this.defaults
          var themeMode = settings && settings.themeMode
          var fontSize = parseInt(settings && settings.fontSize, 10)
          var lineHeight = parseFloat(settings && settings.lineHeight)
          var accent = settings && settings.accent
          var surface = settings && settings.surface
          var rainbow = settings && settings.rainbow
          var rainbowSpeed = parseInt(settings && settings.rainbowSpeed, 10)

          if (themeMode !== 'system' && themeMode !== 'light' && themeMode !== 'dark') {
            themeMode = defaults.themeMode
          }
          if (isNaN(fontSize)) {
            fontSize = defaults.fontSize
          }
          fontSize = Math.max(15, Math.min(22, fontSize))
          if (isNaN(lineHeight)) {
            lineHeight = defaults.lineHeight
          }
          lineHeight = Math.max(1.45, Math.min(2.05, Math.round(lineHeight * 100) / 100))
          if (['ink', 'lagoon', 'vermilion', 'moss', 'mulberry', 'brass'].indexOf(accent) === -1) {
            accent = defaults.accent
          }
          if (['pure', 'paper', 'mist'].indexOf(surface) === -1) {
            surface = defaults.surface
          }
          if (rainbow !== 'on' && rainbow !== 'off') {
            rainbow = defaults.rainbow
          }
          if (isNaN(rainbowSpeed)) {
            rainbowSpeed = defaults.rainbowSpeed
          }
          rainbowSpeed = Math.max(1, Math.min(20, rainbowSpeed))

          return {
            themeMode: themeMode,
            fontSize: fontSize,
            lineHeight: lineHeight,
            accent: accent,
            surface: surface,
            rainbow: rainbow,
            rainbowSpeed: rainbowSpeed
          }
        },
        readStored: function () {
          var legacyTheme = localStorage.getItem('darkMode')
          var themeMode = localStorage.getItem('themeMode')
          if (!themeMode && legacyTheme) {
            themeMode = legacyTheme === 'true' ? 'dark' : 'light'
          }
          return this.normalize({
            themeMode: themeMode,
            fontSize: localStorage.getItem('fontSize'),
            lineHeight: localStorage.getItem('lineHeight'),
            accent: localStorage.getItem('accent'),
            surface: localStorage.getItem('surface'),
            rainbow: localStorage.getItem('rainbow'),
            rainbowSpeed: localStorage.getItem('rainbowSpeed')
          })
        },
        isDark: function (themeMode) {
          if (themeMode === 'dark') return true
          if (themeMode === 'light') return false
          return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        }
      },
      applyAppearance: function (settings) {
        var normalized = this.appearance.normalize(settings)
        var isDark = this.appearance.isDark(normalized.themeMode)
        var surface = this.appearance.themeColors[normalized.surface] || this.appearance.themeColors.pure
        var root = document.documentElement

        this.darkMode = isDark
        this.settings = normalized

        root.className = isDark ? 'dark' : ''
        root.setAttribute('data-theme-mode', normalized.themeMode)
        root.setAttribute('data-accent', normalized.accent)
        root.setAttribute('data-surface', normalized.surface)
        root.setAttribute('data-rainbow', normalized.rainbow)
        root.style.setProperty('--ui-font-size', Math.max(14, normalized.fontSize - 1) + 'px')
        root.style.setProperty('--content-font-size', normalized.fontSize + 'px')
        root.style.setProperty('--content-line-height', normalized.lineHeight)
        root.style.setProperty('--rainbow-speed', normalized.rainbowSpeed + 's')

        document.querySelector('meta[name=theme-color]').setAttribute('content', isDark ? surface.dark : surface.light)
      },
      persistAppearance: function (settings) {
        localStorage.setItem('themeMode', settings.themeMode)
        localStorage.setItem('fontSize', settings.fontSize)
        localStorage.setItem('lineHeight', settings.lineHeight)
        localStorage.setItem('accent', settings.accent)
        localStorage.setItem('surface', settings.surface)
        localStorage.setItem('rainbow', settings.rainbow)
        localStorage.setItem('rainbowSpeed', settings.rainbowSpeed)
        localStorage.removeItem('darkMode')
      },
      updateAppearance: function (patch) {
        var current = this.settings || this.appearance.readStored()
        var next = {
          themeMode: current.themeMode,
          fontSize: current.fontSize,
          lineHeight: current.lineHeight,
          accent: current.accent,
          surface: current.surface,
          rainbow: current.rainbow,
          rainbowSpeed: current.rainbowSpeed
        }
        for (var key in patch) {
          next[key] = patch[key]
        }
        next = this.appearance.normalize(next)
        this.persistAppearance(next)
        this.applyAppearance(next)
      }
    }
    blog.applyAppearance(blog.appearance.readStored())
  </script>
</head>
